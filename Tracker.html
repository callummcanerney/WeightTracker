<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c0e;
    --bg2: #111316;
    --bg3: #181a1f;
    --border: #222429;
    --border2: #2a2d35;
    --text: #e8eaf0;
    --muted: #5a5f70;
    --accent: #4ade80;
    --accent-dim: rgba(74, 222, 128, 0.08);
    --accent-glow: rgba(74, 222, 128, 0.25);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.1);
    --amber: #fbbf24;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100%;
    overflow: hidden;
    font-size: 15px;
    line-height: 1.5;
  }

  /* LAYOUT — full-viewport dashboard */
  .shell {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px 24px;
    gap: 12px;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo-block h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text);
  }

  .logo-block h1 span {
    color: var(--accent);
  }

  .logo-block p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    flex-shrink: 0;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--border2); }

  .stat-card .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }

  .stat-card .value.positive { color: var(--accent); }
  .stat-card .value.negative { color: var(--red); }
  .stat-card .value.neutral { color: var(--amber); }

  .stat-card .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* CHART AREA */
  .chart-wrap {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* BOTTOM ROW — log entry + history side by side */
  .bottom-grid {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 14px;
    align-items: stretch;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .chart-title {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .range-btns {
    display: flex;
    gap: 4px;
  }

  .range-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .range-btn:hover { border-color: var(--border2); color: var(--text); }
  .range-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .chart-canvas-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }

  canvas { display: block; }

  .no-data-msg {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  /* PANELS */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .panel.history-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  .panel-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .field {
    margin-bottom: 12px;
  }

  .field label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .field input::placeholder { color: var(--muted); }

  .btn-add {
    width: 100%;
    background: var(--accent);
    color: #0b1a11;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 11px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .feedback {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-align: center;
    margin-top: 8px;
    min-height: 16px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .feedback.show { opacity: 1; }
  .feedback.err { color: var(--red); }

  /* IMPORT/EXPORT */
  .io-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .btn-io {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .btn-io:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }

  /* LOG TABLE */
  .log-wrap {
    overflow-y: auto;
    max-height: 300px;
  }

  .log-wrap::-webkit-scrollbar { width: 4px; }
  .log-wrap::-webkit-scrollbar-track { background: transparent; }
  .log-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .log-empty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    padding: 30px 0;
    letter-spacing: 0.05em;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 10px 10px;
    text-align: left;
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 1;
  }

  thead th:last-child { text-align: right; }

  tbody tr {
    border-top: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--bg3); }

  tbody td {
    padding: 9px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
  }

  .td-date { color: var(--muted); font-size: 0.7rem; }

  .td-weight {
    font-weight: 500;
    color: var(--text);
  }

  .td-delta {
    font-size: 0.7rem;
  }

  .delta-pos { color: var(--accent); }
  .delta-neg { color: var(--red); }
  .delta-nil { color: var(--muted); }

  .td-actions { text-align: right; }

  .btn-del {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    padding: 3px 7px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .btn-del:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

  /* GOAL LINE */
  .goal-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .goal-row label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .goal-row input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .goal-row input:focus { border-color: var(--accent); }

  .goal-row .btn-io {
    flex: none;
    padding: 6px 12px;
    font-size: 0.62rem;
  }

  /* DATE PICKER */
  .date-picker-wrap { position: relative; }

  .date-input-row {
    display: flex;
    gap: 6px;
  }

  .date-text-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }

  .date-text-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .date-text-input::placeholder { color: var(--muted); }

  .date-cal-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--muted);
    padding: 0 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .date-cal-btn:hover, .date-cal-btn.open {
    border-color: var(--accent);
    color: var(--accent);
  }

  .date-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 14px;
    z-index: 100;
    width: 244px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .date-dropdown.hidden { display: none; }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-nav {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .cal-nav:hover { border-color: var(--accent); color: var(--accent); }

  .cal-month-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }

  .cal-weekdays span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 0;
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    background: none;
    color: var(--text);
    transition: all 0.1s;
  }

  .cal-day:hover { background: var(--bg3); border-color: var(--border2); }
  .cal-day.other-month { color: var(--muted); opacity: 0.35; }
  .cal-day.today { border-color: var(--accent); color: var(--accent); }
  .cal-day.selected { background: var(--accent); color: #0b1a11; font-weight: 600; border-color: var(--accent); }
  .cal-day.selected:hover { opacity: 0.9; }

  /* hidden file input */
  #import-file { display: none; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo-block">
      <h1>Weight<span>.</span></h1>
      <p>Body mass over time — to scale</p>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="label">Starting</div>
      <div class="value" id="stat-start">—</div>
      <div class="sub" id="stat-start-date">no data</div>
    </div>
    <div class="stat-card">
      <div class="label">Current</div>
      <div class="value" id="stat-current">—</div>
      <div class="sub" id="stat-current-date">no data</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Lost</div>
      <div class="value positive" id="stat-lost">—</div>
      <div class="sub" id="stat-days">0 days</div>
    </div>
    <div class="stat-card">
      <div class="label">Weekly Rate</div>
      <div class="value" id="stat-rate">—</div>
      <div class="sub">kg / week avg</div>
    </div>
    <div class="stat-card">
      <div class="label">Goal Progress</div>
      <div class="value" id="stat-goal-pct">—</div>
      <div class="sub" id="stat-goal-rem">set a goal below</div>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-wrap">
    <div class="chart-header">
      <span class="chart-title">Body Weight</span>
      <div class="range-btns" id="range-btns">
        <button class="range-btn" data-range="30">1M</button>
        <button class="range-btn" data-range="90">3M</button>
        <button class="range-btn" data-range="180">6M</button>
        <button class="range-btn active" data-range="all">All</button>
      </div>
    </div>
    <div class="no-data-msg" id="no-data-msg">No entries yet — add your first weight below</div>
    <div class="chart-canvas-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- BOTTOM ROW -->
  <div class="bottom-grid">

    <!-- ADD ENTRY -->
    <div class="panel">
      <div class="panel-title">Log Entry</div>

      <div class="field">
        <label>Date</label>
        <div class="date-picker-wrap">
          <div class="date-input-row">
            <input type="text" class="date-text-input" id="date-text-input" placeholder="DD/MM/YYYY" maxlength="10" autocomplete="off">
            <button class="date-cal-btn" id="date-trigger" type="button">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="3" width="14" height="12" rx="2"/>
                <line x1="1" y1="7" x2="15" y2="7"/>
                <line x1="5" y1="1" x2="5" y2="5"/>
                <line x1="11" y1="1" x2="11" y2="5"/>
              </svg>
            </button>
          </div>
          <div class="date-dropdown hidden" id="date-dropdown">
            <div class="cal-header">
              <button class="cal-nav" id="cal-prev" type="button">‹</button>
              <span class="cal-month-year" id="cal-month-year"></span>
              <button class="cal-nav" id="cal-next" type="button">›</button>
            </div>
            <div class="cal-weekdays">
              <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
            </div>
            <div class="cal-days" id="cal-days"></div>
          </div>
          <input type="hidden" id="inp-date">
        </div>
      </div>
      <div class="field">
        <label>Weight (kg)</label>
        <input type="number" id="inp-weight" step="0.1" min="30" max="300" placeholder="e.g. 82.4">
      </div>

      <button class="btn-add" id="btn-add">Add Entry</button>
      <div class="feedback" id="feedback"></div>

      <!-- GOAL -->
      <div class="goal-row">
        <label>Goal</label>
        <input type="number" id="inp-goal" step="0.1" min="30" max="300" placeholder="target kg">
        <button class="btn-io" id="btn-goal">Set</button>
      </div>

      <!-- IMPORT/EXPORT -->
      <div class="io-row">
        <button class="btn-io" id="btn-export">↓ Export CSV</button>
        <button class="btn-io" id="btn-import-trigger">↑ Import CSV</button>
        <input type="file" id="import-file" accept=".csv">
      </div>
    </div>

    <!-- LOG TABLE -->
    <div class="panel history-panel">
      <div class="panel-title">History</div>
      <div class="log-wrap">
        <div class="log-empty" id="log-empty">No entries yet.</div>
        <table id="log-table" style="display:none">
          <thead>
            <tr>
              <th>Date</th>
              <th>Weight</th>
              <th>Change</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ─── FIREBASE ────────────────────────────────────────────────────────────────
const app = firebase.initializeApp({
  apiKey: "AIzaSyCnVzzlhT5UB2_UlW-2m-i48OAJV_dyVRU",
  authDomain: "weighttracker-3ab18.firebaseapp.com",
  projectId: "weighttracker-3ab18",
  storageBucket: "weighttracker-3ab18.firebasestorage.app",
  messagingSenderId: "129982293138",
  appId: "1:129982293138:web:3410a924e576e31b05324b"
});
const db = firebase.firestore();
const docRef = db.collection('tracker').doc('data');

// In-memory state kept in sync via onSnapshot
let _entries = [];
let _goal = null;

async function save(entries) {
  _entries = entries;
  await docRef.set({ entries, goal: _goal }, { merge: true });
}

async function saveGoal(g) {
  _goal = g;
  await docRef.set({ goal: g }, { merge: true });
}

function sortedEntries(entries) {
  return [...entries].sort((a, b) => new Date(a.date) - new Date(b.date));
}

// ─── CHART ───────────────────────────────────────────────────────────────────
let chart = null;
let activeRange = 'all';

function filterByRange(entries, range) {
  if (range === 'all' || entries.length === 0) return entries;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - parseInt(range));
  return entries.filter(e => new Date(e.date) >= cutoff);
}

function buildChart(entries, goal) {
  const canvas = document.getElementById('chart');
  const noData = document.getElementById('no-data-msg');
  const canvasWrap = document.querySelector('.chart-canvas-wrap');
  const filtered = filterByRange(entries, activeRange);

  if (entries.length === 0) {
    canvas.style.display = 'none';
    noData.style.display = 'block';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  canvas.style.display = 'block';
  noData.style.display = 'none';

  const data = filtered.map(e => ({ x: e.date, y: e.weight }));

  // Trend line (linear regression)
  const trendData = computeTrend(filtered);

  // Goal annotation dataset
  const goalDataset = goal ? [{
    label: 'Goal',
    data: filtered.length >= 2
      ? [{ x: filtered[0].date, y: goal }, { x: filtered[filtered.length - 1].date, y: goal }]
      : [],
    borderColor: 'rgba(251,191,36,0.5)',
    borderDash: [6, 4],
    borderWidth: 1.5,
    pointRadius: 0,
    tension: 0,
    fill: false,
  }] : [];

  const datasets = [
    {
      label: 'Weight (kg)',
      data: data,
      borderColor: '#4ade80',
      backgroundColor: (ctx) => {
        const chart = ctx.chart;
        const { ctx: c, chartArea } = chart;
        if (!chartArea) return 'transparent';
        const gradient = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
        gradient.addColorStop(0, 'rgba(74,222,128,0.18)');
        gradient.addColorStop(1, 'rgba(74,222,128,0)');
        return gradient;
      },
      borderWidth: 2,
      pointRadius: data.length <= 60 ? 4 : 2,
      pointBackgroundColor: '#4ade80',
      pointBorderColor: '#0b0c0e',
      pointBorderWidth: 1.5,
      pointHoverRadius: 6,
      tension: 0.35,
      fill: true,
    },
    {
      label: 'Trend',
      data: trendData,
      borderColor: 'rgba(255,255,255,0.18)',
      borderDash: [4, 4],
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0,
      fill: false,
    },
    ...goalDataset,
  ];

  if (chart) {
    chart.data.datasets = datasets;
    chart.update('none');
    return;
  }

  chart = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#181a1f',
          borderColor: '#2a2d35',
          borderWidth: 1,
          titleColor: '#5a5f70',
          bodyColor: '#e8eaf0',
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 13, weight: '500' },
          padding: 12,
          callbacks: {
            title: (items) => {
              const d = new Date(items[0].parsed.x);
              return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            },
            label: (item) => {
              if (item.dataset.label === 'Trend') return null;
              if (item.dataset.label === 'Goal') return ` Goal: ${item.parsed.y.toFixed(1)} kg`;
              return ` ${item.parsed.y.toFixed(1)} kg`;
            },
          },
          filter: (item) => item.dataset.label !== 'Trend',
        },
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: autoUnit(filtered), tooltipFormat: 'dd MMM yyyy' },
          adapters: { date: {} },
          grid: { color: '#1a1c22', drawBorder: false },
          ticks: {
            color: '#5a5f70',
            font: { family: 'JetBrains Mono', size: 10 },
            maxRotation: 0,
            maxTicksLimit: 8,
          },
          border: { display: false },
        },
        y: {
          grid: { color: '#1a1c22', drawBorder: false },
          ticks: {
            color: '#5a5f70',
            font: { family: 'JetBrains Mono', size: 10 },
            callback: v => v + ' kg',
            maxTicksLimit: 6,
          },
          border: { display: false },
        },
      },
    },
  });
}

function autoUnit(entries) {
  if (entries.length < 2) return 'day';
  const span = (new Date(entries[entries.length - 1].date) - new Date(entries[0].date)) / 86400000;
  if (span <= 60) return 'day';
  if (span <= 365) return 'week';
  return 'month';
}

function computeTrend(entries) {
  if (entries.length < 2) return [];
  const xs = entries.map(e => new Date(e.date).getTime());
  const ys = entries.map(e => e.weight);
  const n = xs.length;
  const meanX = xs.reduce((a, b) => a + b, 0) / n;
  const meanY = ys.reduce((a, b) => a + b, 0) / n;
  const num = xs.reduce((sum, x, i) => sum + (x - meanX) * (ys[i] - meanY), 0);
  const den = xs.reduce((sum, x) => sum + (x - meanX) ** 2, 0);
  const slope = den === 0 ? 0 : num / den;
  const intercept = meanY - slope * meanX;
  return [
    { x: entries[0].date, y: parseFloat((slope * xs[0] + intercept).toFixed(2)) },
    { x: entries[entries.length - 1].date, y: parseFloat((slope * xs[n - 1] + intercept).toFixed(2)) },
  ];
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats(entries, goal) {
  const s = sortedEntries(entries);
  const fmt = w => w != null ? w.toFixed(1) + ' kg' : '—';
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';

  const first = s[0];
  const last  = s[s.length - 1];

  document.getElementById('stat-start').textContent = first ? fmt(first.weight) : '—';
  document.getElementById('stat-start-date').textContent = first ? fmtDate(first.date) : 'no data';

  document.getElementById('stat-current').textContent = last ? fmt(last.weight) : '—';
  document.getElementById('stat-current-date').textContent = last ? fmtDate(last.date) : 'no data';

  if (first && last && s.length > 1) {
    const lost = first.weight - last.weight;
    const lostEl = document.getElementById('stat-lost');
    lostEl.textContent = (lost >= 0 ? '−' : '+') + Math.abs(lost).toFixed(1) + ' kg';
    lostEl.className = 'value ' + (lost >= 0 ? 'positive' : 'negative');

    const days = Math.max(1, (new Date(last.date) - new Date(first.date)) / 86400000);
    document.getElementById('stat-days').textContent = Math.round(days) + ' days';

    const weeklyRate = (lost / days) * 7;
    const rateEl = document.getElementById('stat-rate');
    rateEl.textContent = Math.abs(weeklyRate).toFixed(2);
    rateEl.className = 'value ' + (weeklyRate >= 0 ? 'positive' : 'negative');
  } else {
    document.getElementById('stat-lost').textContent = '—';
    document.getElementById('stat-lost').className = 'value positive';
    document.getElementById('stat-days').textContent = '0 days';
    document.getElementById('stat-rate').textContent = '—';
    document.getElementById('stat-rate').className = 'value';
  }

  // Goal
  if (goal != null && first && last) {
    const total = first.weight - goal;
    const done  = first.weight - last.weight;
    const pct   = total <= 0 ? 100 : Math.min(100, Math.max(0, (done / total) * 100));
    const rem   = last.weight - goal;
    const pctEl = document.getElementById('stat-goal-pct');
    pctEl.textContent = pct.toFixed(0) + '%';
    pctEl.className = pct >= 100 ? 'value positive' : 'value neutral';
    document.getElementById('stat-goal-rem').textContent = rem > 0 ? rem.toFixed(1) + ' kg to go' : 'goal reached!';
  } else {
    document.getElementById('stat-goal-pct').textContent = '—';
    document.getElementById('stat-goal-pct').className = 'value';
    document.getElementById('stat-goal-rem').textContent = 'set a goal below';
  }
}

// ─── TABLE ───────────────────────────────────────────────────────────────────
function renderTable(entries) {
  const s = sortedEntries(entries).reverse(); // newest first
  const tbody = document.getElementById('log-body');
  const empty = document.getElementById('log-empty');
  const table = document.getElementById('log-table');

  if (s.length === 0) {
    empty.style.display = 'block';
    table.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  table.style.display = 'table';

  const allAsc = sortedEntries(entries);
  tbody.innerHTML = s.map((e, i) => {
    const idx = allAsc.findIndex(x => x.date === e.date);
    const prev = allAsc[idx - 1];
    let delta = '';
    if (prev) {
      const diff = e.weight - prev.weight;
      const sign = diff < 0 ? '▼ ' : diff > 0 ? '▲ ' : '';
      const cls  = diff < 0 ? 'delta-pos' : diff > 0 ? 'delta-neg' : 'delta-nil';
      delta = `<span class="${cls}">${sign}${Math.abs(diff).toFixed(1)}</span>`;
    } else {
      delta = `<span class="delta-nil">—</span>`;
    }
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    return `<tr>
      <td class="td-date">${dateStr}</td>
      <td class="td-weight">${e.weight.toFixed(1)} kg</td>
      <td class="td-delta">${delta}</td>
      <td class="td-actions"><button class="btn-del" data-date="${e.date}">del</button></td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const entries = _entries.filter(e => e.date !== btn.dataset.date);
      await save(entries);
    });
  });
}

// ─── REFRESH ─────────────────────────────────────────────────────────────────
function refresh() {
  const sorted = sortedEntries(_entries);
  updateStats(sorted, _goal);
  buildChart(sorted, _goal);
  renderTable(_entries);
}

// ─── RANGE BUTTONS ───────────────────────────────────────────────────────────
document.getElementById('range-btns').addEventListener('click', e => {
  const btn = e.target.closest('.range-btn');
  if (!btn) return;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeRange = btn.dataset.range;
  if (chart) { chart.destroy(); chart = null; }
  refresh();
});

// ─── ADD ENTRY ────────────────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', async () => {
  const dateVal   = document.getElementById('inp-date').value;
  const weightVal = parseFloat(document.getElementById('inp-weight').value);

  if (!dateVal) return showFeedback('Please pick a date', true);
  if (isNaN(weightVal) || weightVal < 30 || weightVal > 300) return showFeedback('Enter a valid weight (30–300 kg)', true);

  const entries = [..._entries];
  const existing = entries.find(e => e.date === dateVal);
  if (existing) {
    existing.weight = weightVal;
    showFeedback('Entry updated');
  } else {
    entries.push({ date: dateVal, weight: weightVal });
    showFeedback('Entry added');
  }
  await save(entries);
  document.getElementById('inp-weight').value = '';
});

// Allow Enter key on weight input
document.getElementById('inp-weight').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-add').click();
});

function showFeedback(msg, isErr = false) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = 'feedback show' + (isErr ? ' err' : '');
  setTimeout(() => fb.classList.remove('show'), 2500);
}

// ─── GOAL ────────────────────────────────────────────────────────────────────
document.getElementById('btn-goal').addEventListener('click', async () => {
  const g = parseFloat(document.getElementById('inp-goal').value);
  if (isNaN(g) || g < 30 || g > 300) return showFeedback('Enter a valid goal weight', true);
  await saveGoal(g);
  showFeedback('Goal set to ' + g.toFixed(1) + ' kg');
});

// ─── EXPORT ───────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  if (_entries.length === 0) return showFeedback('Nothing to export', true);
  const entries = sortedEntries(_entries);
  const csv = 'date,weight_kg\n' + entries.map(e => `${e.date},${e.weight}`).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'weight-log.csv'; a.click();
  URL.revokeObjectURL(url);
  showFeedback('Exported!');
});

// ─── IMPORT ───────────────────────────────────────────────────────────────────
document.getElementById('btn-import-trigger').addEventListener('click', () => {
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
    let count = 0;
    const entries = [..._entries];
    lines.forEach(line => {
      if (line.startsWith('date')) return;
      const [date, weightStr] = line.split(',');
      const weight = parseFloat(weightStr);
      if (!date || isNaN(weight)) return;
      const exists = entries.find(e => e.date === date);
      if (exists) exists.weight = weight;
      else entries.push({ date, weight });
      count++;
    });
    await save(entries);
    showFeedback(`Imported ${count} entries`);
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ─── DATE PICKER ─────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function dateToStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

const _today = new Date();
const todayStr = dateToStr(_today);

const hiddenDate = document.getElementById('inp-date');
const dateTextInput = document.getElementById('date-text-input');
const dateTrigger = document.getElementById('date-trigger');
const dateDropdown = document.getElementById('date-dropdown');
const calDays = document.getElementById('cal-days');
const calMonthYear = document.getElementById('cal-month-year');

function parseDateInput(str) {
  str = str.trim();
  const m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m) {
    let [, d, mo, y] = m;
    if (y.length === 2) y = '20' + y;
    const date = new Date(+y, +mo - 1, +d);
    if (!isNaN(date) && date.getDate() === +d && date.getMonth() === +mo - 1)
      return dateToStr(date);
  }
  return null;
}

function syncTextInput() {
  const sel = hiddenDate.value;
  if (sel) {
    const d = new Date(sel + 'T00:00:00');
    dateTextInput.value = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
  }
}

dateTextInput.addEventListener('blur', () => {
  const parsed = parseDateInput(dateTextInput.value);
  if (parsed) {
    hiddenDate.value = parsed;
    const d = new Date(parsed + 'T00:00:00');
    calViewYear = d.getFullYear();
    calViewMonth = d.getMonth();
  }
  syncTextInput(); // reformat or revert to last valid
});

dateTextInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') dateTextInput.blur();
});

let calViewYear = _today.getFullYear();
let calViewMonth = _today.getMonth();

hiddenDate.value = todayStr;

function renderCalendar() {
  calMonthYear.textContent = `${MONTHS[calViewMonth]} ${calViewYear}`;

  const selected = hiddenDate.value;
  const firstDow = (new Date(calViewYear, calViewMonth, 1).getDay() + 6) % 7; // Mon=0
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calViewYear, calViewMonth, 0).getDate();
  const totalCells  = Math.ceil((firstDow + daysInMonth) / 7) * 7;

  let html = '';

  for (let i = firstDow - 1; i >= 0; i--) {
    const d = new Date(calViewYear, calViewMonth - 1, daysInPrev - i);
    html += `<button class="cal-day other-month" data-date="${dateToStr(d)}" type="button">${daysInPrev - i}</button>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const str = `${calViewYear}-${pad(calViewMonth+1)}-${pad(day)}`;
    let cls = 'cal-day';
    if (str === todayStr) cls += ' today';
    if (str === selected) cls += ' selected';
    html += `<button class="${cls}" data-date="${str}" type="button">${day}</button>`;
  }

  const trailing = totalCells - firstDow - daysInMonth;
  for (let day = 1; day <= trailing; day++) {
    const d = new Date(calViewYear, calViewMonth + 1, day);
    html += `<button class="cal-day other-month" data-date="${dateToStr(d)}" type="button">${day}</button>`;
  }

  calDays.innerHTML = html;

  syncTextInput();
}

function openCalendar() {
  const sel = hiddenDate.value;
  if (sel) {
    const d = new Date(sel + 'T00:00:00');
    calViewYear = d.getFullYear();
    calViewMonth = d.getMonth();
  }
  renderCalendar();
  dateDropdown.classList.remove('hidden');
  dateTrigger.classList.add('open');
}

function closeCalendar() {
  dateDropdown.classList.add('hidden');
  dateTrigger.classList.remove('open');
}

dateTrigger.addEventListener('click', e => {
  e.stopPropagation();
  dateDropdown.classList.contains('hidden') ? openCalendar() : closeCalendar();
});

document.getElementById('cal-prev').addEventListener('click', e => {
  e.stopPropagation();
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  renderCalendar();
});

document.getElementById('cal-next').addEventListener('click', e => {
  e.stopPropagation();
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderCalendar();
});

calDays.addEventListener('click', e => {
  const btn = e.target.closest('.cal-day');
  if (!btn) return;
  hiddenDate.value = btn.dataset.date;
  const d = new Date(btn.dataset.date + 'T00:00:00');
  calViewYear = d.getFullYear();
  calViewMonth = d.getMonth();
  closeCalendar();
  renderCalendar();
});

document.addEventListener('click', e => {
  if (!document.querySelector('.date-picker-wrap').contains(e.target)) closeCalendar();
});

renderCalendar();
syncTextInput();

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Live sync — fires immediately on load, then on every remote change
docRef.onSnapshot(snap => {
  const data = snap.exists ? snap.data() : {};
  _entries = data.entries || [];
  _goal = data.goal ?? null;
  if (_goal != null) document.getElementById('inp-goal').value = _goal;
  refresh();
});
</script>
